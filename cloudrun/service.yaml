apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: job-bot
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/job-bot:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
