name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  changes:
    name: Detect source/test changes
    runs-on: ubuntu-latest
    outputs:
      src_or_tests: ${{ steps.filter.outputs.src_or_tests }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src_or_tests:
              - 'src/**'
              - 'tests/**'

  lint:
    name: Lint (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.src_or_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run format and lint checks
        run: |
          black --check --line-length 100 src tests
          isort --check-only --profile black --line-length 100 src tests

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run static security scan (Bandit)
        run: bandit -q -r src

      - name: Run dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.src_or_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest -m "unit and not expense and not manual"

  coverage:
    name: Coverage Upload
    needs: changes
    if: needs.changes.outputs.src_or_tests == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: src
        run: pytest -m "unit and not expense and not manual" --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets['CODECOV_TOKEN'] }}

  integration-tests:
    name: Integration Tests
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && needs.changes.outputs.src_or_tests == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          PYTHONPATH: src
          OPENAI_API_KEY: ${{ secrets['OPENAI_API_KEY'] }}
          ALPACA_API_KEY: ${{ secrets['ALPACA_API_KEY'] }}
          ALPACA_SECRET_KEY: ${{ secrets['ALPACA_SECRET_KEY'] }}
        run: pytest -m "integration"
