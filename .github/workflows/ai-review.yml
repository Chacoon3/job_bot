name: AI Commit Review

on:
  push:

permissions:
  contents: read

jobs:
  review:
    name: Review pushed commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Review pushed commit with AI agent
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_MODEL: ${{ secrets.OPENAI_API_MODEL }}
          REVIEW_BASE_SHA: ${{ github.event.before }}
          REVIEW_HEAD_SHA: ${{ github.sha }}
          REVIEW_REPORT_PATH: review-report.md
        run: python .github/scripts/review_commit.py

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-review-${{ github.sha }}
          path: review-report.md
          if-no-files-found: warn
